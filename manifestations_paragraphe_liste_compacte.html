  function escapeHTML(s) {
    return (s ?? '').toString().replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Robust CSV parser (handles quotes + commas + CRLF)
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];

      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = false;
          }
        } else {
          field += c;
        }
      } else {
        if (c === '"') {
          inQuotes = true;
        } else if (c === ',') {
          row.push(field);
          field = '';
        } else if (c === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else if (c === '\r') {
          // ignore
        } else {
          field += c;
        }
      }
    }

    // last field/row
    if (field.length > 0 || row.length > 0) {
      row.push(field);
      rows.push(row);
    }

    if (!rows.length) return { headers: [], data: [] };

    const headers = rows.shift().map(h => (h ?? '').trim());
    const data = rows
      .filter(r => r.some(cell => (cell ?? '').trim() !== ''))
      .map(r => {
        const obj = {};
        for (let j = 0; j < headers.length; j++) {
          obj[headers[j]] = (r[j] ?? '').trim();
        }
        return obj;
      });
    return { headers, data };
  }

  function parseISODate(iso) {
    if (!iso) return null;
    const d = new Date(iso + 'T00:00:00');
    return isNaN(d) ? null : d;
  }

  const fmtFull = new Intl.DateTimeFormat('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
  const fmtMonthYear = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' });

  function formatDateRange(startISO, endISO, fallbackText) {
    const d1 = parseISODate(startISO);
    const d2 = parseISODate(endISO);

    if (d1 && d2) {
      if (startISO === endISO) return fmtFull.format(d1);
      const sameMonth = d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear();
      if (sameMonth) {
        return `${d1.getDate()}–${d2.getDate()} ${fmtMonthYear.format(d1)}`;
      }
      return `${fmtFull.format(d1)} – ${fmtFull.format(d2)}`;
    }
    if (d1) return fmtFull.format(d1);
    if (fallbackText) return fallbackText;
    return 'Date à préciser';
  }

  function norm(s) {
    return (s ?? '').toString().trim().toLocaleLowerCase('fr-FR');
  }

  function dateSortKey(rec) {
    const d = parseISODate(rec['Date début']) || parseISODate(rec['Date fin']);
    return d ? d.getTime() : Number.POSITIVE_INFINITY;
  }

  function getTitle(rec) {
    return rec['Manifestation (nom)'] || rec['Thématique / titre complet'] || '(Sans titre)';

  function setActiveButton(key) {
    // visual state
    const all = [btnDate, btnTitle, btnAxe];
    all.forEach(b => b.classList.remove('active'));
    btnDate.setAttribute('aria-pressed', 'false');
    btnTitle.setAttribute('aria-pressed', 'false');
    btnAxe.setAttribute('aria-pressed', 'false');

    if (key === 'date') { btnDate.classList.add('active'); btnDate.setAttribute('aria-pressed', 'true'); }
    if (key === 'title') { btnTitle.classList.add('active'); btnTitle.setAttribute('aria-pressed', 'true'); }
    if (key === 'axe') { btnAxe.classList.add('active'); btnAxe.setAttribute('aria-pressed', 'true'); }
  }

  function renderSortArrows() {
    arrowDate.textContent = '';
    arrowTitle.textContent = '';
    arrowAxe.textContent = '';

    const arrow = sortDir === 1 ? '↑' : '↓';
    if (sortKey === 'date') arrowDate.textContent = arrow;
    if (sortKey === 'title') arrowTitle.textContent = arrow;
    if (sortKey === 'axe') arrowAxe.textContent = arrow;
  }

  function sortAndRender() {
    const sorted = [...records];

    sorted.sort((a, b) => {
      let cmp = 0;
      if (sortKey === 'date') {
        cmp = dateSortKey(a) - dateSortKey(b);
      } else if (sortKey === 'title') {
        cmp = norm(getTitle(a)).localeCompare(norm(getTitle(b)), 'fr');
      } else if (sortKey === 'axe') {
        cmp = norm(a['Axe']).localeCompare(norm(b['Axe']), 'fr');
        if (cmp === 0) cmp = norm(getTitle(a)).localeCompare(norm(getTitle(b)), 'fr');
      }
      return cmp * sortDir;
    });

    renderTable(sorted);
    setActiveButton(sortKey);
    renderSortArrows();
  }

  function renderTable(list) {
    tbody.innerHTML = '';

    for (const rec of list) {
      const id = escapeHTML(rec['ID'] || (rec['Manifestation (nom)'] + '|' + rec['Date début'] + '|' + rec['Axe']));
      const dateText = formatDateRange(rec['Date début'], rec['Date fin'], rec['Date (texte original)']);
      const title = getTitle(rec);
      const axe = rec['Axe'] || '—';

      const details = {
        'Type': rec['Type'],
        'Thématique / titre complet': rec['Thématique / titre complet'],
        'Date (texte original)': rec['Date (texte original)'],
        'Horaire': rec['Horaire (si précisé)'],
        'Ville': rec['Ville'],
        'Pays': rec['Pays'],
        'Institution / lieu': rec['Institution / lieu'],
        'Implication de Paragraphe': rec['Implication de Paragraphe'],
        'Partenaires / co-organisateurs': rec['Partenaires / co-organisateurs'],
        'Organisateurs (personnes)': rec['Organisateurs (personnes)'],
        'Participants / intervenants': rec['Participants / intervenants'],
        'Projet / cadre': rec['Projet / cadre'],
        'URL': rec['URL'],
        'Notes / statut': rec['Notes / statut'],
        'Source': rec['Source (réponse)'],
      };

      const summaryTr = document.createElement('tr');
      summaryTr.className = 'summary-row';
      summaryTr.innerHTML = `
        <td class="col-date">${escapeHTML(dateText)}</td>
        <td class="col-title"><div class="title">${escapeHTML(title)}</div></td>
        <td class="col-axe">${escapeHTML(axe)}</td>
        <td class="col-actions">
          <button type="button" class="infoBtn" data-target="${id}">Infos</button>
        </td>
      `;

      const detailsTr = document.createElement('tr');
      detailsTr.className = 'details-row';
      detailsTr.dataset.id = id;
      detailsTr.style.display = 'none';

      let kvHtml = '<div class="kv">';
      for (const [k, vRaw] of Object.entries(details)) {
        const v = (vRaw ?? '').toString().trim();
        if (!v) continue;

        let vHtml = escapeHTML(v);
        if (k === 'URL') {
          const safeUrl = v;
          vHtml = `<a href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHTML(safeUrl)}</a>`;
        }
        kvHtml += `<div class="k">${escapeHTML(k)}</div><div class="v">${vHtml}</div>`;
      }
      kvHtml += '</div>';

      detailsTr.innerHTML = `
        <td colspan="4">
          <div class="details" role="region" aria-label="Détails">
            ${kvHtml || '<span class="muted">Aucun détail renseigné.</span>'}
          </div>
        </td>
      `;

      tbody.appendChild(summaryTr);
      tbody.appendChild(detailsTr);
    }

    // attach toggle handlers
    tbody.querySelectorAll('.infoBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        const detailRow = tbody.querySelector(`tr.details-row[data-id="${CSS.escape(targetId)}"]`);
        if (!detailRow) return;

        const isOpen = detailRow.style.display !== 'none';
        detailRow.style.display = isOpen ? 'none' : 'table-row';
        btn.textContent = isOpen ? 'Infos' : 'Fermer';
      });
    });
  }

  async function loadCSV() {
    let csvText = '';
    let usedFallback = false;

    try {
      const resp = await fetch(GOOGLE_CSV_URL, { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      csvText = await resp.text();
    } catch (e) {
      usedFallback = true;
      csvText = EMBEDDED_CSV;
    }

    const parsed = parseCSV(csvText);
    let data = parsed.data || [];

    records = data;

    // Update the year pill (e.g., "2026" or "2026–2027") based on the dataset
    const yearPill = document.getElementById('yearPill');
    if (yearPill) {
      const years = new Set();
      for (const rec of records) {
        let y = (rec['Année'] || '').toString().trim();
        if (!/^\d{4}$/.test(y)) {
          const d = (rec['Date début'] || rec['Date fin'] || '').toString().trim();
          const mm = d.match(/^(\d{4})-/);
          if (mm) y = mm[1];
        }
        if (/^\d{4}$/.test(y)) years.add(parseInt(y, 10));
      }

      if (years.size) {
        const ys = Array.from(years).sort((a,b) => a-b);
        const label = (ys.length === 1) ? String(ys[0]) : `${ys[0]}–${ys[ys.length - 1]}`;
        yearPill.textContent = label;
        document.title = `Manifestations scientifiques – Paragraphe (${label})`;
      } else {
        yearPill.style.display = 'none';
      }
    }

    const loadedMsg = usedFallback
      ? 'Chargement depuis la copie intégrée (le navigateur a bloqué ou échoué sur le CSV Google Sheets).'
      : 'Chargement depuis Google Sheets réussi.';

    statusEl.innerHTML = `
      ${escapeHTML(loadedMsg)} • ${records.length} manifestation(s) • Dernière mise à jour : ${new Date().toLocaleString('fr-FR')}
    `;

    sortAndRender();
  }

  function bindSortButtons() {
    function setSort(key) {
      if (sortKey === key) {
        sortDir *= -1;  // toggle direction
      } else {
        sortKey = key;
        sortDir = 1;    // reset to ascending
      }
      sortAndRender();
    }

    btnDate.addEventListener('click', () => setSort('date'));
    btnTitle.addEventListener('click', () => setSort('title'));
    btnAxe.addEventListener('click', () => setSort('axe'));
  }

  bindSortButtons();
  loadCSV().catch(err => {
    statusEl.innerHTML = `<span class="error">Erreur : ${escapeHTML(err?.message || String(err))}</span>`;
  });
})();
</script>
</body>
</html>
