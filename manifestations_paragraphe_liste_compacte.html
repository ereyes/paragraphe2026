<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Manifestations scientifiques – Paragraphe</title>
  <style>
    :root {
      --maxw: 1100px;
      --border: #e6e6e6;
      --text: #111;
      --muted: #666;
      --bg: #fff;
      --bg-soft: #fafafa;
      --btn: #f4f4f4;
      --btn-hover: #ededed;
      --btn-active: #dfefff;
      --focus: #1a73e8;
      --event-bg: #f2f7ff;
      --event-bg-hover: #e8f1ff;
      --overlay: rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
      line-height: 1.35;
    }
    a { color: var(--focus); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 16px; }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      font-size: 12px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: var(--bg-soft);
    }
    .sub {
      margin: 6px 0 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
    }
    .toolbarRow {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px 16px;
    }
    .toolbarGroup {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .label {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--btn);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: var(--btn-hover); }
    button.active {
      background: var(--btn-active);
      border-color: #c6ddff;
    }
    button:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }
    select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
    }

    .status {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-soft);
      padding: 10px 12px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .muted { color: var(--muted); }

    /* List view table */
    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
    }
    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      font-size: 14px;
    }
    tbody tr.summary-row:hover td { background: #fcfcfc; }
    .col-date { width: 190px; white-space: nowrap; color: var(--muted); font-variant-numeric: tabular-nums; }
    .col-title { width: auto; }
    .col-axe { width: 120px; white-space: nowrap; }
    .col-actions { width: 92px; text-align: right; }
    .title { font-weight: 600; }
    .details {
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--border);
    }
    .kv {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 8px 12px;
      font-size: 13px;
    }
    .k { color: var(--muted); }
    .v { color: var(--text); overflow-wrap: anywhere; }

    @media (max-width: 720px) {
      .col-axe { display: none; }
      .kv { grid-template-columns: 1fr; }
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
    }

    /* Timeline view */
    .timeline {
      position: relative;
      padding-left: 26px;
      margin-top: 6px;
    }
    .timeline::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .t-month {
      margin: 18px 0 8px;
      font-weight: 700;
      text-transform: capitalize;
    }
    .t-item {
      position: relative;
      margin: 0 0 10px;
      padding: 10px 12px 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
    }
    .t-item::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid var(--focus);
      background: var(--bg);
    }

    /* Stacked header to avoid overlap:
       line 1 = date, line 2 = title, line 3 = axe */
    .t-head {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .t-main {
      flex: 1 1 auto;
      min-width: 0; /* critical for wrapping inside flex */
    }
    .t-date {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      margin-bottom: 4px;
    }
    .t-title {
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .t-axe {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .t-actions { flex: 0 0 auto; text-align: right; }
    .t-details {
      margin-top: 10px;
    }

    /* Calendar view */
    .calendarControls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .yearGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }
    .month {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg);
    }
    .monthHeader {
      padding: 8px 10px;
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      text-transform: capitalize;
    }
    .monthTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .monthTable th {
      padding: 4px 0;
      color: var(--muted);
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }
    .monthTable td {
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      height: 64px;
      vertical-align: top;
      padding: 4px 5px;
    }
    .monthTable tr td:last-child { border-right: none; }
    .dayCell {
      user-select: none;
    }
    .dayCell.hasEvents {
      cursor: pointer;
      background: var(--event-bg);
    }
    .dayCell.hasEvents:hover { background: var(--event-bg-hover); }
    .dayCell.selected { outline: 2px solid var(--focus); outline-offset: -2px; }
    .dayTop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .dayNum {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }
    /* Simple dot indicator (no titles in the grid) */
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--focus);
      display: inline-block;
      flex: 0 0 auto;
      align-self: center;
    }

    .dayPanel {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg-soft);
      padding: 10px 12px;
    }
    .dayPanel h3 {
      margin: 0 0 10px;
      font-size: 14px;
    }
    .dayEvent {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 12px;
      padding: 10px 12px;
      margin: 0 0 10px;
    }
    .dayEventHead {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      align-items: start;
    }
    .dayEventMeta {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }
    .unscheduled {
      margin-top: 14px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--muted);
      background: #fff;
    }

    /* Modal (popup) pour le détail des jours (vue calendrier) */
    body.modalOpen { overflow: hidden; }

    .modalOverlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none; /* becomes flex when open */
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }
    .modal {
      width: min(900px, 100%);
      max-height: 85vh;
      overflow: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.25);
    }
    .modalHeader {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
    }
    .modalHeader h3 {
      margin: 0;
      font-size: 14px;
    }
    .modalBody {
      padding: 12px;
      background: var(--bg);
    }
    .modalCloseBtn {
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>Manifestations scientifiques – Paragraphe <span class="pill" id="yearPill">…</span></h1>
      <p class="sub">Aperçu condensé (date, titre, axe) avec bouton <strong>Infos</strong>. Choisissez la <strong>vue</strong> : liste, ligne de temps ou calendrier.</p>
    </div>
  </header>

  <div class="toolbar">

      </div>
    </div>
  </div>

  <main>
    <div class="wrap">
      <div class="status" id="status">Chargement…</div>

      <!-- LIST VIEW -->
      <section id="viewList" aria-label="Vue liste">
        <table aria-label="Manifestations scientifiques (liste)">
          <thead>
            <tr>
              <th class="col-date">Date</th>
              <th class="col-title">Manifestation</th>
              <th class="col-axe">Axe</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <!-- rows injected here -->
          </tbody>
        </table>
      </section>

      <!-- TIMELINE VIEW -->
      <section id="viewTimeline" aria-label="Vue ligne de temps" style="display:none;">
        <div id="timeline" class="timeline" aria-label="Ligne de temps verticale">
          <!-- items injected here -->
        </div>
      </section>

      <!-- CALENDAR VIEW -->
      <section id="viewCalendar" aria-label="Vue calendrier" style="display:none;">
        <div class="calendarControls">
          <label class="label" for="calendarYear">Année :</label>
          <select id="calendarYear"></select>
          <span class="label">Cliquez sur un jour mis en évidence pour afficher les manifestations.</span>
        </div>

        <div id="calendarGrid" class="yearGrid" aria-label="Calendrier de l'année"></div>

        <div id="unscheduled" class="unscheduled" style="display:none;"></div>
      </section>
    </div>
  </main>

  <!-- Modal (popup) pour le détail des jours (vue calendrier) -->
  <div id="modalOverlay" class="modalOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHeader">
        <h3 id="modalTitle">Détails</h3>
        <button type="button" id="modalClose" class="modalCloseBtn">Fermer</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
    </div>
  </div>

  // ---------- DOM ----------
  const statusEl = document.getElementById('status');

  const viewSelect = document.getElementById('viewSelect');
  const sortGroup = document.getElementById('sortGroup');

  const viewList = document.getElementById('viewList');
  const viewTimeline = document.getElementById('viewTimeline');
  const viewCalendar = document.getElementById('viewCalendar');

  const tbody = document.getElementById('tbody');
  const timelineEl = document.getElementById('timeline');

  const calendarYearSel = document.getElementById('calendarYear');
  const calendarGrid = document.getElementById('calendarGrid');
  const unscheduledEl = document.getElementById('unscheduled');

  const modalOverlay = document.getElementById('modalOverlay');
  const modalClose = document.getElementById('modalClose');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  const btnDate = document.getElementById('sortDate');
  const btnTitle = document.getElementById('sortTitle');
  const btnAxe = document.getElementById('sortAxe');

  const arrowDate = document.getElementById('sortDateArrow');
  const arrowTitle = document.getElementById('sortTitleArrow');
  const arrowAxe = document.getElementById('sortAxeArrow');

  // ---------- State ----------
  let records = [];
  let headers = [];
  let fieldMap = {};

  let sortKey = 'date';     // 'date' | 'title' | 'axe'
  let sortDir = 1;          // 1 asc, -1 desc
  let currentView = 'list'; // 'list' | 'timeline' | 'calendar'

  // calendarIndex: Map(year -> Map(isoDay -> Array<rec>))
  let calendarIndex = new Map();
  let unscheduled = [];

  // ---------- Helpers ----------
  function escapeHTML(s) {
    return (s ?? '').toString().replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function normKey(s) {
    return (s ?? '')
      .toString()
      .trim()
      .toLocaleLowerCase('fr-FR')
      .normalize('NFD')
      .replace(/\p{Diacritic}/gu, '')
      .replace(/[^a-z0-9]+/g, ' ')
      .trim();
  }

  // Column aliases for robustness (in case the Sheet header changes slightly)
  const FIELD_ALIASES = {
    id: ['id'],
    year: ['annee', 'année', 'year'],
    axe: ['axe', 'axe equipe', 'axe équipe', 'axe / equipe', 'axe / équipe'],
    name: ['manifestation nom', 'manifestation', 'nom', 'evenement', 'événement', 'manifestation (nom)'],
    type: ['type'],
    fullTitle: ['thematique titre complet', 'thématique titre complet', 'titre complet', 'thematique', 'thématique', 'thématique / titre complet'],
    start: ['date debut', 'date début', 'date de debut', 'date de début', 'date début'],
    end: ['date fin', 'date de fin', 'date fin'],
    dateOriginal: ['date texte original', 'date original', 'date (texte original)'],
    time: ['horaire', 'horaire si precise', 'horaire (si precisé)', 'horaire (si précisé)'],
    city: ['ville'],
    country: ['pays'],
    place: ['institution lieu', 'institution / lieu', 'lieu', 'institution'],
    implication: ['implication de paragraphe', 'implication'],
    partners: ['partenaires', 'co organisateurs', 'co-organisateurs', 'partenaires / co-organisateurs'],
    organizers: ['organisateurs personnes', 'organisateurs', 'organisateurs (personnes)'],
    participants: ['participants intervenants', 'participants', 'intervenants', 'participants / intervenants'],
    project: ['projet cadre', 'projet', 'projet / cadre'],
    url: ['url', 'lien'],
    notes: ['notes statut', 'notes', 'statut', 'notes / statut'],
    source: ['source reponse', 'source réponse', 'source', 'source (réponse)'],
  };

  function buildFieldMap(headers) {
    const byNorm = new Map();
    for (const h of headers) {
      const nk = normKey(h);
      if (!byNorm.has(nk)) byNorm.set(nk, h);
    }

    const map = {};
    for (const [canon, aliases] of Object.entries(FIELD_ALIASES)) {
      for (const a of aliases) {
        const h = byNorm.get(normKey(a));
        if (h) { map[canon] = h; break; }
      }
    }
    return map;
  }

  function get(rec, canonKey) {
    const h = fieldMap[canonKey];
    if (!h) return '';
    return (rec[h] ?? '').toString().trim();
  }

  function parseISODate(iso) {
    if (!iso) return null;
    const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return null;
    const d = new Date(Date.UTC(parseInt(m[1], 10), parseInt(m[2], 10) - 1, parseInt(m[3], 10)));
    return isNaN(d) ? null : d;
  }

  function isoFromDateUTC(d) {
    return d.toISOString().slice(0, 10);
  }

  function addDaysUTC(d, n) {
    return new Date(d.getTime() + n * 86400000);
  }

  const fmtFull = new Intl.DateTimeFormat('fr-FR', { day: '2-digit', month: 'long', year: 'numeric', timeZone: 'UTC' });
  const fmtMonthYear = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric', timeZone: 'UTC' });

  function formatDateRange(startISO, endISO, fallbackText) {
    const d1 = parseISODate(startISO);
    const d2 = parseISODate(endISO);

    if (d1 && d2) {
      if (startISO === endISO) return fmtFull.format(d1);
      return `${fmtFull.format(d1)} → ${fmtFull.format(d2)}`;
    }
    if (d1) return fmtFull.format(d1);
    if (fallbackText) return fallbackText;
    return 'Date à préciser';
  }

  function norm(s) {
    return (s ?? '').toString().trim().toLocaleLowerCase('fr-FR');
  }

  function dateSortKey(rec) {
    const d = parseISODate(get(rec, 'start')) || parseISODate(get(rec, 'end'));
    return d ? d.getTime() : Number.POSITIVE_INFINITY;
  }

  function getTitle(rec) {
    return get(rec, 'name') || get(rec, 'fullTitle') || '(Sans titre)';
  }

  function getAxe(rec) {
    return get(rec, 'axe') || '—';
  }

  function getId(rec) {
    const id = get(rec, 'id');
    if (id) return id;
    return `${getTitle(rec)}|${get(rec,'start')}|${getAxe(rec)}`;
  }

  function buildDetailsKVHtml(rec) {
    const details = {
      'Type': get(rec, 'type'),
      'Thématique / titre complet': get(rec, 'fullTitle'),
      'Date (texte original)': get(rec, 'dateOriginal'),
      'Horaire': get(rec, 'time'),
      'Ville': get(rec, 'city'),
      'Pays': get(rec, 'country'),
      'Institution / lieu': get(rec, 'place'),
      'Implication de Paragraphe': get(rec, 'implication'),
      'Partenaires / co-organisateurs': get(rec, 'partners'),
      'Organisateurs (personnes)': get(rec, 'organizers'),
      'Participants / intervenants': get(rec, 'participants'),
      'Projet / cadre': get(rec, 'project'),
      'URL': get(rec, 'url'),
      'Notes / statut': get(rec, 'notes'),
      'Source': get(rec, 'source'),
    };

    let kvHtml = '<div class="kv">';
    let hasAny = false;
    for (const [k, vRaw] of Object.entries(details)) {
      const v = (vRaw ?? '').toString().trim();
      if (!v) continue;
      hasAny = true;

      let vHtml = escapeHTML(v);
      if (k === 'URL') {
        const safeUrl = v;
        vHtml = `<a href="${escapeHTML(safeUrl)}" target="_blank" rel="noopener noreferrer">${escapeHTML(safeUrl)}</a>`;
      }
      kvHtml += `<div class="k">${escapeHTML(k)}</div><div class="v">${vHtml}</div>`;
    }
    kvHtml += '</div>';

    if (!hasAny) return '<span class="muted">Aucun détail renseigné.</span>';
    return kvHtml;
  }

  function setActiveButton(key) {
    btnDate.classList.toggle('active', key === 'date');
    btnTitle.classList.toggle('active', key === 'title');
    btnAxe.classList.toggle('active', key === 'axe');

    btnDate.setAttribute('aria-pressed', key === 'date' ? 'true' : 'false');
    btnTitle.setAttribute('aria-pressed', key === 'title' ? 'true' : 'false');
    btnAxe.setAttribute('aria-pressed', key === 'axe' ? 'true' : 'false');
  }

  function renderSortArrows() {
    arrowDate.textContent = '';
    arrowTitle.textContent = '';
    arrowAxe.textContent = '';

    const arrow = sortDir === 1 ? '↑' : '↓';
    if (sortKey === 'date') arrowDate.textContent = arrow;
    if (sortKey === 'title') arrowTitle.textContent = arrow;
    if (sortKey === 'axe') arrowAxe.textContent = arrow;
  }

  function sortRecords(list) {
    const sorted = [...list];
    sorted.sort((a, b) => {
      let cmp = 0;
      if (sortKey === 'date') {
        cmp = dateSortKey(a) - dateSortKey(b);
      } else if (sortKey === 'title') {
        cmp = norm(getTitle(a)).localeCompare(norm(getTitle(b)), 'fr');
      } else if (sortKey === 'axe') {
        cmp = norm(getAxe(a)).localeCompare(norm(getAxe(b)), 'fr');
        if (cmp === 0) cmp = norm(getTitle(a)).localeCompare(norm(getTitle(b)), 'fr');
      }
      return cmp * sortDir;
    });
    return sorted;
  }

  function attachInfoToggles(root) {
    root.querySelectorAll('.infoBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.getAttribute('data-target');
        if (!targetId) return;

        const row = root.querySelector(`tr.details-row[data-id="${CSS.escape(targetId)}"]`);
        if (row) {
          const isOpen = row.style.display !== 'none';
          row.style.display = isOpen ? 'none' : 'table-row';
          btn.textContent = isOpen ? 'Infos' : 'Fermer';
          return;
        }

        const block = root.querySelector(`.details-block[data-id="${CSS.escape(targetId)}"]`);
        if (block) {
          const isOpen = block.style.display !== 'none';
          block.style.display = isOpen ? 'none' : 'block';
          btn.textContent = isOpen ? 'Infos' : 'Fermer';
        }
      });
    });
  }


  // ---------- Modal (popup) ----------
  function isModalOpen() {
    return !!(modalOverlay && modalOverlay.style.display === 'flex');
  }

  function openModal(title, bodyHtml) {
    if (!modalOverlay || !modalTitle || !modalBody) return;

    modalTitle.textContent = title;
    modalBody.innerHTML = bodyHtml || '';

    modalOverlay.style.display = 'flex';
    modalOverlay.setAttribute('aria-hidden', 'false');
    document.body.classList.add('modalOpen');

    // Enable "Infos" toggles inside the popup
    attachInfoToggles(modalBody);

    if (modalClose) modalClose.focus();
  }

  function closeModal() {
    if (!modalOverlay) return;

    modalOverlay.style.display = 'none';
    modalOverlay.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('modalOpen');

    if (modalBody) modalBody.innerHTML = '';
  }

  if (modalClose) {
    modalClose.addEventListener('click', closeModal);
  }

  if (modalOverlay) {
    // Click outside the modal closes it
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isModalOpen()) closeModal();
  });


  // ---------- Renderers ----------
  function renderTable(list) {
    tbody.innerHTML = '';

    for (const rec of list) {
      const id = getId(rec);
      const dateText = formatDateRange(get(rec,'start'), get(rec,'end'), get(rec,'dateOriginal'));
      const title = getTitle(rec);
      const axe = getAxe(rec);

      const summaryTr = document.createElement('tr');
      summaryTr.className = 'summary-row';
      summaryTr.innerHTML = `
        <td class="col-date">${escapeHTML(dateText)}</td>
        <td class="col-title"><div class="title">${escapeHTML(title)}</div></td>
        <td class="col-axe">${escapeHTML(axe)}</td>
        <td class="col-actions">
          <button type="button" class="infoBtn" data-target="${escapeHTML(id)}">Infos</button>
        </td>
      `;

      const detailsTr = document.createElement('tr');
      detailsTr.className = 'details-row';
      detailsTr.dataset.id = id;
      detailsTr.style.display = 'none';
      detailsTr.innerHTML = `
        <td colspan="4">
          <div class="details" role="region" aria-label="Détails">
            ${buildDetailsKVHtml(rec)}
          </div>
        </td>
      `;

      tbody.appendChild(summaryTr);
      tbody.appendChild(detailsTr);
    }

    attachInfoToggles(tbody);
  }

  function renderTimeline(list) {
    timelineEl.innerHTML = '';

    let lastMonthKey = null;

    for (const rec of list) {
      const id = getId(rec);
      const d = parseISODate(get(rec,'start')) || parseISODate(get(rec,'end'));
      const monthKey = d ? `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}` : 'unknown';

      // Month separators only make sense when sorting by date.
      if (sortKey === 'date' && monthKey !== lastMonthKey) {
        const h = document.createElement('div');
        h.className = 't-month';
        h.textContent = d ? fmtMonthYear.format(d) : 'Dates à préciser';
        timelineEl.appendChild(h);
        lastMonthKey = monthKey;
      }

      const dateText = formatDateRange(get(rec,'start'), get(rec,'end'), get(rec,'dateOriginal'));
      const title = getTitle(rec);
      const axe = getAxe(rec);

      const item = document.createElement('div');
      item.className = 't-item';

      const axeLine = (axe && axe !== '—')
        ? `<div class="t-axe">Axe : ${escapeHTML(axe)}</div>`
        : '';

      item.innerHTML = `
        <div class="t-head">
          <div class="t-main">
            <div class="t-date">${escapeHTML(dateText)}</div>
            <div class="t-title">${escapeHTML(title)}</div>
            ${axeLine}
          </div>
          <div class="t-actions">
            <button type="button" class="infoBtn" data-target="${escapeHTML(id)}">Infos</button>
          </div>
        </div>
        <div class="t-details details-block details" data-id="${escapeHTML(id)}" style="display:none;" role="region" aria-label="Détails">
          ${buildDetailsKVHtml(rec)}
        </div>
      `;
      timelineEl.appendChild(item);
    }

    attachInfoToggles(timelineEl);
  }

  function buildCalendarIndex(recs) {
    calendarIndex = new Map();
    unscheduled = [];

    for (const rec of recs) {
      const sISO = get(rec,'start');
      const eISO = get(rec,'end') || sISO;

      let s = parseISODate(sISO);
      let e = parseISODate(eISO);

      if (!s && !e) {
        unscheduled.push(rec);
        continue;
      }
      if (!s) s = e;
      if (!e) e = s;

      // swap if inverted
      if (e.getTime() < s.getTime()) {
        const tmp = s; s = e; e = tmp;
      }

      for (let d = s; d.getTime() <= e.getTime(); d = addDaysUTC(d, 1)) {
        const y = d.getUTCFullYear();
        const iso = isoFromDateUTC(d);

        if (!calendarIndex.has(y)) calendarIndex.set(y, new Map());
        const byDay = calendarIndex.get(y);
        if (!byDay.has(iso)) byDay.set(iso, []);
        byDay.get(iso).push(rec);
      }
    }
  }

  function getAllYears(recs) {
    const years = new Set();
    for (const rec of recs) {
      let y = get(rec,'year');
      if (!/^\d{4}$/.test(y)) {
        const d = get(rec,'start') || get(rec,'end');
        const mm = (d || '').match(/^(\d{4})-/);
        if (mm) y = mm[1];
      }
      if (/^\d{4}$/.test(y)) years.add(parseInt(y, 10));
    }
    return Array.from(years).sort((a,b) => a-b);
  }

  function renderCalendarYear(year) {
    const byDay = calendarIndex.get(year) || new Map();

    // build months
    calendarGrid.innerHTML = '';
    closeModal();

    const dayNames = ['L', 'M', 'M', 'J', 'V', 'S', 'D']; // lundi→dimanche

    for (let month = 0; month < 12; month++) {
      const first = new Date(Date.UTC(year, month, 1));
      const daysInMonth = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
      const firstDow = (first.getUTCDay() + 6) % 7; // Mon=0 ... Sun=6

      const monthCard = document.createElement('div');
      monthCard.className = 'month';

      const mh = document.createElement('div');
      mh.className = 'monthHeader';
      mh.textContent = fmtMonthYear.format(first);
      monthCard.appendChild(mh);

      const table = document.createElement('table');
      table.className = 'monthTable';

      const thead = document.createElement('thead');
      const hr = document.createElement('tr');
      for (const dn of dayNames) {
        const th = document.createElement('th');
        th.textContent = dn;
        hr.appendChild(th);
      }
      thead.appendChild(hr);
      table.appendChild(thead);

      const tbodyM = document.createElement('tbody');

      let day = 1;
      for (let r = 0; r < 6; r++) {
        const tr = document.createElement('tr');

        for (let c = 0; c < 7; c++) {
          const td = document.createElement('td');

          const cellIndex = r * 7 + c;
          if (cellIndex < firstDow || day > daysInMonth) {
            // empty
            td.innerHTML = '&nbsp;';
          } else {
            const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const evts = byDay.get(iso) || [];

            td.className = 'dayCell' + (evts.length ? ' hasEvents' : '');
            td.dataset.date = iso;

            if (evts.length) {
              td.setAttribute('role', 'button');
              td.tabIndex = 0;
              td.title = `${evts.length} événement(s)`;
            }

            const top = document.createElement('div');
            top.className = 'dayTop';

            const num = document.createElement('div');
            num.className = 'dayNum';
            num.textContent = String(day);

            top.appendChild(num);

            if (evts.length) {
              const dot = document.createElement('span');
              dot.className = 'dot';
              dot.title = `${evts.length} événement(s)`;
              dot.setAttribute('aria-label', `${evts.length} événement(s)`);
              top.appendChild(dot);
            }

            td.appendChild(top);

            day++;
          }

          tr.appendChild(td);
        }

        tbodyM.appendChild(tr);

        // stop early if the month is done and next row would be empty
        if (day > daysInMonth) {
          // but keep row if it already has day cells
          // (the current loop row always has at least one)
          // next rows can be omitted
          if (r >= 4) break;
        }
      }

      table.appendChild(tbodyM);
      monthCard.appendChild(table);
      calendarGrid.appendChild(monthCard);
    }

    // bind day click
    let selectedCell = null;
    calendarGrid.querySelectorAll('.dayCell.hasEvents').forEach(cell => {
      const activate = () => {
        if (selectedCell) selectedCell.classList.remove('selected');
        selectedCell = cell;
        selectedCell.classList.add('selected');

        const iso = cell.dataset.date;
        showDay(year, iso);
      };

      cell.addEventListener('click', activate);
      cell.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          activate();
        }
      });
    });

    // unscheduled section
    if (unscheduled.length) {
      const list = sortRecords(unscheduled);
      let html = `<strong>Dates à préciser</strong> — ${unscheduled.length} manifestation(s) sans date ISO exploitable pour le calendrier.<br><br>`;
      html += '<div>';
      for (const rec of list) {
        const id = getId(rec);
        const title = getTitle(rec);
        const axe = getAxe(rec);
        const dateText = formatDateRange(get(rec,'start'), get(rec,'end'), get(rec,'dateOriginal'));

        html += `
          <div class="dayEvent">
            <div class="dayEventHead">
              <div>
                <div class="t-title">${escapeHTML(title)}</div>
                <div class="dayEventMeta">${escapeHTML(dateText)} • Axe : ${escapeHTML(axe)}</div>
              </div>
              <div style="text-align:right;">
                <button type="button" class="infoBtn" data-target="${escapeHTML(id)}">Infos</button>
              </div>
            </div>
            <div class="details details-block" data-id="${escapeHTML(id)}" style="display:none;">
              ${buildDetailsKVHtml(rec)}
            </div>
          </div>
        `;
      }
      html += '</div>';

      unscheduledEl.innerHTML = html;
      unscheduledEl.style.display = 'block';
      attachInfoToggles(unscheduledEl);
    } else {
      unscheduledEl.style.display = 'none';
      unscheduledEl.innerHTML = '';
    }
  }


  function showDay(year, isoDay) {
    const byDay = calendarIndex.get(year) || new Map();
    const list = byDay.get(isoDay) || [];

    const d = parseISODate(isoDay);
    const label = d ? fmtFull.format(d) : isoDay;

    // remove duplicates (safety)
    const uniq = [];
    const seen = new Set();
    for (const rec of list) {
      const key = getId(rec);
      if (seen.has(key)) continue;
      seen.add(key);
      uniq.push(rec);
    }

    const sorted = sortRecords(uniq);

    if (!sorted.length) {
      openModal(label, `<div class="muted">Aucune manifestation ce jour-là.</div>`);
      return;
    }

    let html = '';
    for (const rec of sorted) {
      const id = getId(rec);
      const title = getTitle(rec);
      const axe = getAxe(rec);
      const dateText = formatDateRange(get(rec,'start'), get(rec,'end'), get(rec,'dateOriginal'));

      html += `
        <div class="dayEvent">
          <div class="dayEventHead">
            <div>
              <div class="t-title">${escapeHTML(title)}</div>
              <div class="dayEventMeta">${escapeHTML(dateText)} • Axe : ${escapeHTML(axe)}</div>
            </div>
            <div style="text-align:right;">
              <button type="button" class="infoBtn" data-target="${escapeHTML(id)}">Infos</button>
            </div>
          </div>
          <div class="details details-block" data-id="${escapeHTML(id)}" style="display:none;">
            ${buildDetailsKVHtml(rec)}
          </div>
        </div>
      `;
    }

    openModal(`${label} — ${sorted.length} manifestation(s)`, html);
  }

  function renderCurrentView() {
    if (!records.length) return;

    const sorted = sortRecords(records);

    if (currentView === 'list') {
      renderTable(sorted);
    } else if (currentView === 'timeline') {
      renderTimeline(sorted);
    } else if (currentView === 'calendar') {
      // calendar rendered separately
      const years = getAllYears(records);
      const year = parseInt(calendarYearSel.value || (years[0] ?? new Date().getFullYear()), 10);
      renderCalendarYear(year);
    }

    setActiveButton(sortKey);
    renderSortArrows();
  }

  // ---------- CSV loading ----------
  // Robust CSV parser (handles quotes + commas + CRLF)
  function parseCSV(text) {
    const rows = [];
    let row = [];
    let field = '';
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const c = text[i];

      if (inQuotes) {
        if (c === '"') {
          if (text[i + 1] === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = false;
          }
        } else {
          field += c;
        }
      } else {
        if (c === '"') {
          inQuotes = true;
        } else if (c === ',') {
          row.push(field);
          field = '';
        } else if (c === '\n') {
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else if (c === '\r') {
          // ignore
        } else {
          field += c;
        }
      }
    }

    // last field/row
    if (field.length > 0 || row.length > 0) {
      row.push(field);
      rows.push(row);
    }

    if (!rows.length) return { headers: [], data: [] };

    const headers = rows.shift().map(h => (h ?? '').trim());
    const data = rows
      .filter(r => r.some(cell => (cell ?? '').trim() !== ''))
      .map(r => {
        const obj = {};
        for (let j = 0; j < headers.length; j++) {
          obj[headers[j]] = (r[j] ?? '').trim();
        }
        return obj;
      });
    return { headers, data };
  }

  async function loadCSV() {
    let csvText = '';
    let usedEmbedded = false;

    try {
      const res = await fetch(GOOGLE_CSV_URL, { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      csvText = await res.text();
    } catch (e) {
      usedEmbedded = true;
      csvText = EMBEDDED_CSV;
    }

    const parsed = parseCSV(csvText);
    headers = parsed.headers;
    records = parsed.data;

    fieldMap = buildFieldMap(headers);

    // year pill like "2026–2027"
    const yearPill = document.getElementById('yearPill');
    if (yearPill) {
      const years = getAllYears(records);
      if (years.length) {
        const label = years.length === 1 ? String(years[0]) : `${years[0]}–${years[years.length - 1]}`;
        yearPill.textContent = label;
      } else {
        yearPill.textContent = '—';
      }
    }

    // calendar
    buildCalendarIndex(records);
    const years = getAllYears(records);
    calendarYearSel.innerHTML = '';
    for (const y of years) {
      const opt = document.createElement('option');
      opt.value = String(y);
      opt.textContent = String(y);
      calendarYearSel.appendChild(opt);
    }
    // default: earliest year (typically 2026)
    if (years.length) calendarYearSel.value = String(years[0]);

    calendarYearSel.addEventListener('change', () => {
      if (currentView === 'calendar') renderCurrentView();
    });

    const loadedMsg = usedEmbedded
      ? 'Chargement depuis Google Sheets impossible (utilisation de la copie intégrée).'
      : 'Chargement depuis Google Sheets réussi.';

    statusEl.innerHTML = `
      ${escapeHTML(loadedMsg)} • ${records.length} manifestation(s) • Dernière mise à jour : ${new Date().toLocaleString('fr-FR')}
    `;

    renderCurrentView();
  }

  // ---------- Controls ----------
  function bindSortButton(btn, key) {
    btn.addEventListener('click', () => {
      if (sortKey === key) {
        sortDir *= -1;
      } else {
        sortKey = key;
        sortDir = 1;
      }
      renderCurrentView();
    });
  }

  function setView(view) {
    closeModal();
    currentView = view;

    viewList.style.display = (view === 'list') ? 'block' : 'none';
    viewTimeline.style.display = (view === 'timeline') ? 'block' : 'none';
    viewCalendar.style.display = (view === 'calendar') ? 'block' : 'none';

    // sorting is meaningful for list + timeline; calendar has its own structure
    sortGroup.style.display = (view === 'calendar') ? 'none' : 'flex';

    renderCurrentView();
  }

  viewSelect.addEventListener('change', () => setView(viewSelect.value));

  bindSortButton(btnDate, 'date');
  bindSortButton(btnTitle, 'title');
  bindSortButton(btnAxe, 'axe');

  // init
  setView('list');
  loadCSV();
})();
</script>
